# Constellation v2 — Docker Compose for Rancher Desktop
version: "3.8"

services:
  registry:
    image: constellation-v2-registry:latest
    build:
      context: .
      dockerfile: registry/Dockerfile
    environment:
      REGISTRY_HOST: 0.0.0.0
      REGISTRY_PORT: 9000
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  compass:
    image: constellation-v2-compass:latest
    build:
      context: .
      dockerfile: agents/compass/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      team-lead:
        condition: service_healthy
    environment:
      AGENT_ID: compass
      HOST: 0.0.0.0
      PORT: 8000
      REGISTRY_URL: http://registry:9000
      AGENT_RUNTIME: claude-code
      ARTIFACT_ROOT: /app/artifacts
      CONTAINER_RUNTIME: rancher
      DYNAMIC_AGENT_NETWORK: constellation-v2-network
      DOCKER_SOCKET: /var/run/docker.sock
    labels:
      constellation.agent_id: compass
      constellation.agent_role: fundamental
    volumes:
      - ./artifacts:/app/artifacts
      - .:/workspace:ro
      - ./config/.env:/app/config/.env:ro
      - ~/.rd/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_SOCKET_GID:-0}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  team-lead:
    image: constellation-v2-team-lead:latest
    build:
      context: .
      dockerfile: agents/team_lead/Dockerfile
    environment:
      AGENT_ID: team-lead
      HOST: 0.0.0.0
      PORT: 8030
      REGISTRY_URL: http://registry:9000
      AGENT_RUNTIME: claude-code
      ARTIFACT_ROOT: /app/artifacts
      CONTAINER_RUNTIME: rancher
      DYNAMIC_AGENT_NETWORK: constellation-v2-network
      DOCKER_SOCKET: /var/run/docker.sock
    labels:
      constellation.agent_id: team-lead
      constellation.agent_role: fundamental
    volumes:
      - ./artifacts:/app/artifacts
      - ./config/.env:/app/config/.env:ro
      - ~/.rd/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_SOCKET_GID:-0}"
    ports:
      - "8030:8030"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

networks:
  constellation-v2:
    driver: bridge
    name: constellation-v2-network