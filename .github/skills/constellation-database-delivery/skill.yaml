id: constellation-database-delivery
version: 1.0.0
level: agent-specific
owner: web-agent
appliesTo:
  agentRoles: [backend, web]
  workflows: [development]
  taskTags: [database, sql, migration, schema]
  languages: [sql, python, typescript]
runtimeCompatibility:
  backends: [connect-agent, copilot-cli, claude-code]
requiredTools:
  - read_local_file
  - edit_local_file
  - run_local_command
provides:
  - database-design-guidance
  - migration-checklist
  - query-optimization-hints
hashPolicy: sha256
trustLevel: reviewed
