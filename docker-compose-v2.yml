# Constellation v2 — Docker Compose
# Orchestrates all agents in the new framework architecture.

# Every service below merges in `config/.env` (gitignored) via the
# `x-agent-defaults` anchor so values like `TZ=...` propagate without
# re-declaring `env_file:` per service. Compose still respects any
# value already set in the shell, so operators can pass `TZ=...` on
# the command line and it wins.
#
# Default timezone precedence (highest → lowest):
#   1. ``TZ`` already in the shell environment
#   2. ``TZ=...`` line in ``config/.env`` (loaded via env_file below)
#   3. ``default_tz: ...`` in ``config/constellation.yaml`` — applied
#      by ``framework.devlog`` at import time as a final fallback
#
# To change the deployment-wide default, edit
# ``config/constellation.yaml:default_tz``; no other file needs to
# change. To override per deployment, drop ``TZ=...`` in
# ``config/.env`` (or export it in the shell before ``docker compose
# up``).

x-agent-defaults: &agent-defaults
  env_file:
    - config/.env
  restart: unless-stopped

services:

  # -----------------------------------------------------------------------
  # Registry — capability definition and live instance tracking (port 9000)
  # -----------------------------------------------------------------------
  registry:
    <<: *agent-defaults
    image: constellation-v2-registry:latest
    build:
      context: .
      dockerfile: registry/Dockerfile
    environment:
      REGISTRY_HOST: "0.0.0.0"
      REGISTRY_PORT: "9000"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  init-register:
    <<: *agent-defaults
    image: constellation-v2-init-register:latest
    build:
      context: .
      dockerfile: scripts/register_agents.Dockerfile
    command: ["python3", "scripts/register_agents.py", "--registered-by", "compose-init"]
    depends_on:
      registry:
        condition: service_healthy
    environment:
      REGISTRY_URL: "http://registry:9000"
    restart: "no"
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # Compass Agent — control plane entry point (port 8000)
  # -----------------------------------------------------------------------
  compass:
    <<: *agent-defaults
    image: constellation-v2-compass:latest
    build:
      context: .
      dockerfile: agents/compass/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
      team-lead:
        condition: service_healthy
      jira:
        condition: service_healthy
      scm:
        condition: service_healthy
      ui-design:
        condition: service_healthy
    environment:
      AGENT_ID: "compass"
      HOST: "0.0.0.0"
      PORT: "8000"
      REGISTRY_URL: "http://registry:9000"
      # COMPASS_BASE_URL is the callback base that downstream agents
      # (e.g. office) POST to when their work is done.  It must be
      # reachable from inside the constellation-v2 docker network so the
      # per-task office container can reach compass.  In Rancher-managed
      # deployments override this via env_file or runtime override to use
      # the externally-routable hostname of the compass service.
      COMPASS_BASE_URL: "http://compass:8000"
      CONSTELLATION_RUNTIME_ENV_FILE: /app/config/.runtime.env
      ARTIFACT_ROOT: /app/artifacts
      DYNAMIC_AGENT_NETWORK: constellation-v2-network
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/.env:/app/config/.runtime.env:ro
    group_add:
      - "${DOCKER_SOCKET_GID:-0}"
    labels:
      constellation.agent_id: "compass"
      constellation.agent_name: "Compass Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # Team Lead Agent — intelligence layer (port 8030)
  # -----------------------------------------------------------------------
  team-lead:
    <<: *agent-defaults
    image: constellation-v2-team-lead:latest
    build:
      context: .
      dockerfile: agents/team_lead/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    environment:
      AGENT_ID: "team-lead"
      HOST: "0.0.0.0"
      PORT: "8030"
      REGISTRY_URL: "http://registry:9000"
      CONSTELLATION_RUNTIME_ENV_FILE: /app/config/.runtime.env
      ARTIFACT_ROOT: /app/artifacts
      DYNAMIC_AGENT_NETWORK: constellation-v2-network
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/.env:/app/config/.runtime.env:ro
    group_add:
      - "${DOCKER_SOCKET_GID:-0}"
    labels:
      constellation.agent_id: "team-lead"
      constellation.agent_name: "Team Lead Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8030:8030"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # Jira Agent — boundary agent (port 8010)
  # -----------------------------------------------------------------------
  jira:
    <<: *agent-defaults
    image: constellation-v2-jira:latest
    build:
      context: .
      dockerfile: agents/jira/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    environment:
      AGENT_ID: "jira"
      HOST: "0.0.0.0"
      PORT: "8010"
      REGISTRY_URL: "http://registry:9000"
      ARTIFACT_ROOT: /app/artifacts
    volumes:
      - ./artifacts:/app/artifacts
      - ./agents/jira/.env:/app/agents/jira/.env:ro
    labels:
      constellation.agent_id: "jira"
      constellation.agent_name: "Jira Agent"
      constellation.agent_role: "boundary"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # SCM Agent — boundary agent (port 8020)
  # -----------------------------------------------------------------------
  scm:
    <<: *agent-defaults
    image: constellation-v2-scm:latest
    build:
      context: .
      dockerfile: agents/scm/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    environment:
      AGENT_ID: "scm"
      HOST: "0.0.0.0"
      PORT: "8020"
      REGISTRY_URL: "http://registry:9000"
      ARTIFACT_ROOT: /app/artifacts
    volumes:
      - ./artifacts:/app/artifacts
      - ./agents/scm/.env:/app/agents/scm/.env:ro
    labels:
      constellation.agent_id: "scm"
      constellation.agent_name: "SCM Agent"
      constellation.agent_role: "boundary"
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # UI Design Agent — boundary agent (port 8040)
  # -----------------------------------------------------------------------
  ui-design:
    <<: *agent-defaults
    image: constellation-v2-ui-design:latest
    build:
      context: .
      dockerfile: agents/ui_design/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    environment:
      AGENT_ID: "ui-design"
      HOST: "0.0.0.0"
      PORT: "8040"
      REGISTRY_URL: "http://registry:9000"
      ARTIFACT_ROOT: /app/artifacts
    volumes:
      - ./artifacts:/app/artifacts
      - ./agents/ui_design/.env:/app/agents/ui_design/.env:ro
    labels:
      constellation.agent_id: "ui-design"
      constellation.agent_name: "UI Design Agent"
      constellation.agent_role: "boundary"
    ports:
      - "8040:8040"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

  # -----------------------------------------------------------------------
  # Office Agent — per-task document processing (port 8060)
  # -----------------------------------------------------------------------
  office:
    <<: *agent-defaults
    profiles:
      - manual
    image: constellation-v2-office:latest
    build:
      context: .
      dockerfile: agents/office/Dockerfile
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    environment:
      AGENT_ID: "office"
      HOST: "0.0.0.0"
      PORT: "8060"
      REGISTRY_URL: "http://registry:9000"
      CONSTELLATION_RUNTIME_ENV_FILE: /app/config/.runtime.env
      ARTIFACT_ROOT: /app/artifacts
      OFFICE_SOURCE_ROOT: ${OFFICE_SOURCE_ROOT:-/app/userdata}
      OFFICE_ALLOWED_BASE_PATHS: ${OFFICE_ALLOWED_BASE_PATHS:-}
      OFFICE_BACKUP_ENABLED: ${OFFICE_BACKUP_ENABLED:-true}
    volumes:
      - ./artifacts:/app/artifacts
      - ./config/.env:/app/config/.runtime.env:ro
    labels:
      constellation.agent_id: "office"
      constellation.agent_name: "Office Agent"
      constellation.agent_role: "per-task"
    ports:
      - "8060:8060"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8060/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    networks:
      - constellation-v2

networks:
  constellation-v2:
    driver: bridge
    name: constellation-v2-network