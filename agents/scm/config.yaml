# SCM Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials belong in agents/scm/.env (never in this file).

agent_id: scm
name: "SCM Agent"
description: "Boundary adapter: repo inspect, branch list/create, PR operations (GitHub and Bitbucket Server)"
mode: single_turn
execution_mode: persistent

# Backend selection is a global deployment selector — configure it in config/.env
# (SCM_BACKEND=bitbucket|github-rest|github-mcp) or constellation.yaml
# (boundary.scm.backend). Default: github-mcp (set in constellation.yaml).

port: 8020

# Capabilities exposed via A2A skill IDs
capabilities:
  - scm.repo.inspect
  - scm.repo.get
  - scm.repo.clone
  - scm.branch.list
  - scm.branch.create
  - scm.branch.push
  - scm.pr.create
  - scm.pr.get
  - scm.pr.info
  - scm.pr.diff
  - scm.pr.list
  - scm.pr.comment
  - scm.pr.comment.inline
  - scm.pr.image.upload
  - scm.pr.update
