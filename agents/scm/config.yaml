# SCM Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials belong in agents/scm/.env (never in this file).

agent_id: scm
name: "SCM Agent"
description: "Boundary adapter: repo inspect, branch list/create, PR operations (GitHub and Bitbucket Server)"
mode: single_turn
execution_mode: persistent

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

port: 8020

# Capabilities exposed via A2A skill IDs
capabilities:
  - scm.repo.inspect
  - scm.repo.get
  - scm.repo.clone
  - scm.branch.list
  - scm.branch.create
  - scm.branch.push
  - scm.pr.create
  - scm.pr.get
  - scm.pr.list
  - scm.pr.comment
  - scm.pr.image.upload
  - scm.pr.update
