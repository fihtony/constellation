# Jira Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials belong in agents/jira/.env (never in this file).

agent_id: jira
name: "Jira Agent"
description: "Boundary adapter: Jira ticket fetch, search, comment (REST + MCP)"
mode: single_turn
execution_mode: persistent

# Backend: mcp (default) | rest
# Using Atlassian Rovo MCP as default per system design requirements.
backend: mcp

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

port: 8010

# Capabilities exposed via A2A skill IDs
capabilities:
  - jira.ticket.fetch
  - jira.ticket.get
  - jira.ticket.search
  - jira.comment.add
  - jira.ticket.comment
  - jira.ticket.update
  - jira.ticket.transition
  - jira.transitions.list
  - jira.user.me
  - jira.comment.list
