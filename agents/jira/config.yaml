# Jira Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials belong in agents/jira/.env (never in this file).

agent_id: jira
name: "Jira Agent"
description: "Boundary adapter: Jira ticket fetch, search, comment (REST + MCP)"
mode: single_turn
execution_mode: persistent

# Backend selection is a global deployment selector — configure it in config/.env
# (JIRA_BACKEND=mcp|rest) or config/constellation.yaml (boundary.jira.backend).
# Default: mcp (set in constellation.yaml).

port: 8010

# Capabilities exposed via A2A skill IDs
capabilities:
  - jira.ticket.fetch
  - jira.ticket.get
  - jira.ticket.search
  - jira.comment.add
  - jira.ticket.comment
  - jira.ticket.update
  - jira.ticket.transition
  - jira.transitions.list
  - jira.user.me
  - jira.comment.list
