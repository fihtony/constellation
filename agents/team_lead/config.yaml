# Team Lead Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials/port overrides belong in agents/team_lead/.env.

agent_id: team-lead
name: "Team Lead Agent"
description: "Intelligence layer: analysis, planning, dispatch, code review coordination"
mode: task
execution_mode: persistent
runtime_env_required: true

# Permission model:
# - permission_profile is authoritative for Team Lead's own runtime permissions.
# - Team Lead also reads child permission profiles to build executionContract
#   values that can only narrow each child agent's local capability envelope.
# - AgentDefinition.tools also defaults from config/permissions/team-lead.yaml.
permission_profile: "team-lead"

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

port: 8030
capabilities:
  - team-lead.task.analyze
