# Web Dev Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials/port overrides belong in agents/web_dev/.env.

agent_id: web-dev
name: "Web Dev Agent"
description: "Full-stack web development: clone, branch, implement, test, PR"
mode: task
execution_mode: per-task
runtime_env_required: true

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

default_skills:
  - react-nextjs
  - testing

# Permission model:
# - permission_profile is the authoritative maximum capability envelope.
# - Team Lead sends executionContract at runtime to narrow this profile per task.
# - AgentDefinition.tools also defaults from config/permissions/web-dev.yaml.
permission_profile: web-dev
capabilities:
  - web-dev.task.execute
launch_spec:
  image: constellation-v2-web-dev:latest
  port: 8050
  startup_delay_seconds: 1.5
  pass_through_env:
    - AGENT_RUNTIME
    - AGENT_MODEL
    - CONSTELLATION_RUNTIME_BACKEND
    - CONSTELLATION_RUNTIME_MODEL
    - OPENAI_MODEL
    - OPENAI_BASE_URL
    - OPENAI_API_KEY
    - ANTHROPIC_AUTH_TOKEN
    - ANTHROPIC_BASE_URL
    - ANTHROPIC_MODEL
    - ANTHROPIC_DEFAULT_HAIKU_MODEL
    - ANTHROPIC_DEFAULT_SONNET_MODEL
    - ANTHROPIC_DEFAULT_OPUS_MODEL
    - ANTHROPIC_API_KEY
    - API_TIMEOUT_MS
    - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
    - COPILOT_GITHUB_TOKEN
    - LOCAL_TIMEZONE
    - TZ
    - WEB_DEV_MAX_TEST_CYCLES
