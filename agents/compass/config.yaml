# Compass Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials/port overrides belong in agents/compass/.env.

agent_id: compass
name: "Compass Agent"
description: "Control plane: task classification, permission check, routing, and user summary"
mode: chat
execution_mode: persistent
runtime_env_required: true

# Permission model:
# - Persistent agents apply permission_profile directly at runtime.
# - Only per-task children receive an executionContract, which narrows their
#   local permission profile rather than replacing it.
# - AgentDefinition.tools also defaults from config/permissions/compass.yaml.
permission_profile: "compass"

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

port: 8000
capabilities:
  - compass.task.route
