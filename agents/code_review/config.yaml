# Code Review Agent — agent-specific configuration
# Inherits all unset keys from config/constellation.yaml (global defaults).
# Credentials/port overrides belong in agents/code_review/.env.

agent_id: code-review
name: "Code Review Agent"
description: "Independent code review: quality, security, tests, requirements compliance"
mode: task
execution_mode: per-task
runtime_env_required: true
runtime_capabilities:
  run: true
  run_agentic: true
  agentic_tools: true

# runtime and model inherit from global constellation.yaml:
#   runtime.backend: connect-agent
#   runtime.model: gpt-5-mini

default_skills:
  - code-review

# Permission model:
# - permission_profile is the authoritative maximum capability envelope.
# - Team Lead sends executionContract at runtime to narrow this profile per task.
# - AgentDefinition.tools also defaults from config/permissions/code-review.yaml.
permission_profile: code-review
capabilities:
  - review.code.check
launch_spec:
  image: constellation-v2-code-review:latest
  port: 8060
  startup_delay_seconds: 1.5
  pass_through_env:
    - AGENT_RUNTIME
    - AGENT_MODEL
    - CONSTELLATION_RUNTIME_BACKEND
    - CONSTELLATION_RUNTIME_MODEL
    - OPENAI_MODEL
    - OPENAI_BASE_URL
    - OPENAI_API_KEY
    - ANTHROPIC_AUTH_TOKEN
    - ANTHROPIC_BASE_URL
    - ANTHROPIC_MODEL
    - ANTHROPIC_DEFAULT_HAIKU_MODEL
    - ANTHROPIC_DEFAULT_SONNET_MODEL
    - ANTHROPIC_DEFAULT_OPUS_MODEL
    - ANTHROPIC_API_KEY
    - API_TIMEOUT_MS
    - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
    - COPILOT_GITHUB_TOKEN
    - COPILOT_MODEL
    - COPILOT_PROVIDER_API_KEY
    - COPILOT_PROVIDER_BASE_URL
    - COPILOT_PROVIDER_TYPE
    - LOCAL_TIMEZONE
    - TZ
