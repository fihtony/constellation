agent_id: office
name: "Office Agent"
description: "Generic office execution: summarize documents, analyze structured data, and plan folder organization"
mode: task
execution_mode: per-task
runtime_env_required: true
default_skills:
  - office-generic-methodology
tools:
  - read_pdf
  - read_docx
  - read_txt
  - read_csv
  - read_xlsx
  - read_xls
  - read_pptx
  - list_directory
  - write_workspace
  - write_file
  - organize_folder
  - organize_move_file
permission_profile: office
permissions:
  allowed_tools:
    - read_pdf
    - read_docx
    - read_txt
    - read_csv
    - read_xlsx
    - read_xls
    - read_pptx
    - list_directory
    - write_workspace
    - write_file
    - organize_folder
    - organize_move_file
  denied_tools:
    - run_command
    - edit_file
    - scm_push
    - scm_create_pr
  scm: none
  filesystem: workspace-only
  agent_launching: false
  allowed_agents: []
runtime_backend: claude-code
model: MiniMax-M2.7
capabilities:
  - office.document.summarize
  - office.data.analyze
  - office.folder.organize
launch_spec:
  image: constellation-v2-office:latest
  port: 8060
  startup_delay_seconds: 1.5
  pass_through_env:
    - AGENT_RUNTIME
    - AGENT_MODEL
    - CONSTELLATION_RUNTIME_BACKEND
    - CONSTELLATION_RUNTIME_MODEL
    - OPENAI_MODEL
    - OPENAI_BASE_URL
    - OPENAI_API_KEY
    - ANTHROPIC_AUTH_TOKEN
    - ANTHROPIC_BASE_URL
    - ANTHROPIC_MODEL
    - ANTHROPIC_DEFAULT_HAIKU_MODEL
    - ANTHROPIC_DEFAULT_SONNET_MODEL
    - ANTHROPIC_DEFAULT_OPUS_MODEL
    - ANTHROPIC_API_KEY
    - API_TIMEOUT_MS
    - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
    - COPILOT_GITHUB_TOKEN
    - LOCAL_TIMEZONE
    - TZ
