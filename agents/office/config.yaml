agent_id: office
name: "Office Agent"
description: "Generic office execution: summarize documents, analyze structured data, and plan folder organization"
mode: task
execution_mode: per-task
default_skills:
  - office-generic-methodology
tools:
  - read_pdf
  - read_docx
  - read_txt
  - read_csv
  - read_xlsx
  - read_xls
  - read_pptx
  - list_directory
  - write_workspace
  - write_file
  - organize_folder
  - organize_move_file
permission_profile: office_readonly
runtime_backend: claude-code
model: MiniMax-M2.7
launch_spec:
  image: constellation-v2-office:latest
  port: 8060
  startup_delay_seconds: 1.5
  pass_through_env:
    - AGENT_RUNTIME
    - AGENT_MODEL
    - CONSTELLATION_RUNTIME_BACKEND
    - CONSTELLATION_RUNTIME_MODEL
    - OPENAI_MODEL
    - OPENAI_BASE_URL
    - OPENAI_API_KEY
    - ANTHROPIC_MODEL
    - ANTHROPIC_API_KEY
    - COPILOT_GITHUB_TOKEN
    - LOCAL_TIMEZONE
    - TZ
