# Constellation v2 — main configuration
# This file is loaded by all agents on startup.

project:
  name: constellation
  version: "2.0.0"

# Default timezone for every agent container. The wall-clock zone every
# devlog line and every server-emitted timestamp is anchored to. Set
# this to the IANA name (e.g. ``America/Toronto``) of the deployment's
# home zone; users in a different zone can override via ``TZ`` in
# ``config/.env``, which the docker compose file propagates into every
# service. The same value is mirrored as the fallback in
# ``docker-compose-v2.yml`` so non-compose runs (e.g. ``python -m
# agents.<x>``) also pick up the right zone.
default_tz: America/Toronto

# Default runtime backend for all agents
runtime:
  backend: claude-code              # claude-code | copilot-cli | codex-cli | connect-agent
  model: claude-haiku-4-5-20251001  # generic fallback model

# Boundary agent backend selection (system defaults)
# Override any of these in config/.env without changing this file.
boundary:
  jira:
    backend: mcp            # mcp | rest
  scm:
    backend: github-mcp     # bitbucket | github-rest | github-mcp
  ui_design:
    default_provider: stitch  # stitch | figma

# Agent launch specifications
agents:
  compass:
    launch_spec:
      runtime: docker
      network: constellation-network
  team-lead:
    launch_spec:
      runtime: docker
      network: constellation-network

# Skills directory
skills:
  directory: skills

# Data directory (SQLite DBs, artifacts)
data:
  directory: data

# Container settings
container:
  runtime: docker            # docker | rancher
  network: constellation-network

# Registry service
registry:
  url: http://registry:9000

