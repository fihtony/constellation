# Constellation v2 — main configuration
# This file is loaded by all agents on startup.

project:
  name: constellation
  version: "2.0.0"

# Default runtime backend for all agents
runtime:
  backend: claude-code
  model: claude-haiku-4-5-20251001

# Agent launch specifications
agents:
  compass:
    launch_spec:
      runtime: docker
      network: constellation-network
  team-lead:
    launch_spec:
      runtime: docker
      network: constellation-network

# Skills directory
skills:
  directory: skills

# Data directory (SQLite DBs, artifacts)
data:
  directory: data

# Container settings
container:
  runtime: docker            # docker | rancher
  network: constellation-network

# Registry service
registry:
  url: http://registry:9000

