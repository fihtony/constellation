# Permissions: Development tasks (read-write SCM)
allowed_tools:
  - read_file
  - write_file
  - edit_file
  - run_command
  - search_code
  - glob
  - grep
  - scm_clone
  - clone_repo
  - scm_branch
  - scm_commit
  - scm_push
  - scm_create_pr
  - scm_add_pr_comment
  - scm_add_pr_inline_comment
  - scm_upload_pr_image
  - scm_update_pr
  - scm_list_branches
  - query_registry
  - request_clarification
  - fetch_jira_ticket
  - fetch_design
  # Jira boundary tools (called by workflow nodes, not LLM directly)
  - jira_list_transitions
  - jira_transition
  - jira_comment
  - jira_update
  - jira_get_token_user
  - jira_list_comments
  - jira_search

denied_tools: []

scm: read-write
filesystem: workspace-only
agent_launching: false
allowed_agents: []

custom:
  protected_branch_patterns:
    - "^main$"
    - "^master$"
    - "^develop$"
    - "^release/.*$"
  allowed_command_patterns:
    - "^pwd$"
    - "^ls(\\s|$).*"
    - "^git (status|diff|log|show|branch|checkout|switch|add|commit|push|fetch|pull|remote|rev-parse|ls-files)(\\s|$).*"
    - "^(npm|pnpm|yarn) (install|ci|test|run|exec|lint|build|typecheck)(\\s|$).*"
    - "^npx (vite|vitest|eslint|tsc|playwright)(\\s|$).*"
    - "^python3? -m pytest(\\s|$).*"
    - "^pytest(\\s|$).*"
  denied_command_patterns:
    - "(^|\\s)(sudo|su)(\\s|$).*"
    - "(^|\\s)rm\\s+-.*"
    - "^python3? -c(\\s|$).*"
    - "(curl|wget).*\\|.*(sh|bash)"
