services:
  registry:
    image: constellation-registry-agent:latest
    build:
      context: .
      dockerfile: registry/Dockerfile
    command: ["python3", "registry/app.py"]
    environment:
      REGISTRY_HOST: "0.0.0.0"
      REGISTRY_PORT: "9000"
      TZ: "${TZ:-UTC}"
    labels:
      constellation.agent_id: "capability-registry"
      constellation.agent_name: "Capability Registry"
      constellation.agent_role: "fundamental"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  init-register:
    image: constellation-init-register:latest
    build:
      context: .
      dockerfile: scripts/init-register.Dockerfile
    command: ["python3", "scripts/init_register.py"]
    depends_on:
      registry:
        condition: service_healthy
    environment:
      REGISTRY_URL: "http://registry:9000"
    labels:
      constellation.agent_id: "registry-bootstrap"
      constellation.agent_name: "Registry Bootstrap"
      constellation.agent_role: "fundamental"

  compass:
    image: constellation-compass-agent:latest
    build:
      context: .
      dockerfile: compass/Dockerfile
    command: ["python3", "compass/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
      jira:
        condition: service_healthy
      scm:
        condition: service_healthy
      ui-design:
        condition: service_healthy
    env_file:
      - ./compass/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ADVERTISED_BASE_URL: "http://compass:8080"
      REGISTRY_URL: "http://registry:9000"
      A2A_ACK_TIMEOUT_SECONDS: "15"
      A2A_TASK_TIMEOUT_SECONDS: "3600"
      ARTIFACT_ROOT: "/app/artifacts"
      DEFAULT_DYNAMIC_IMAGE: "constellation-android-agent:latest"
      DYNAMIC_AGENT_NETWORK: "constellation-network"
      TZ: "${TZ:-UTC}"
      # ARTIFACT_ROOT_HOST is loaded from compass/.env — do NOT override here with an empty
      # variable expansion or it will blank out the value from env_file.
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    labels:
      constellation.agent_id: "compass-agent"
      constellation.agent_name: "Compass Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  jira:
    command: ["python3", "jira/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./jira/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8010"
      AGENT_ID: "jira-agent"
      ADVERTISED_BASE_URL: "http://jira:8010"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
      TZ: "${TZ:-UTC}"
    build:
      context: .
      dockerfile: jira/Dockerfile
    image: constellation-jira-agent:latest
    labels:
      constellation.agent_id: "jira-agent"
      constellation.agent_name: "Jira Agent"
      constellation.agent_role: "fundamental"
    volumes:
      - ./artifacts:/app/artifacts
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  scm:
    image: constellation-scm-agent:latest
    build:
      context: .
      dockerfile: scm/Dockerfile
    command: ["python3", "scm/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./scm/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8020"
      AGENT_ID: "scm-agent"
      ADVERTISED_BASE_URL: "http://scm:8020"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
      SCM_PROVIDER: "github"
      TZ: "${TZ:-UTC}"
    volumes:
      - ./artifacts:/app/artifacts
    labels:
      constellation.agent_id: "scm-agent"
      constellation.agent_name: "SCM Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  ui-design:
    image: constellation-ui-design-agent:latest
    build:
      context: .
      dockerfile: ui-design/Dockerfile
    command: ["python3", "ui-design/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./ui-design/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8040"
      AGENT_ID: "ui-design-agent"
      ADVERTISED_BASE_URL: "http://ui-design:8040"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
      TZ: "${TZ:-UTC}"
    volumes:
      - ./artifacts:/app/artifacts
    labels:
      constellation.agent_id: "ui-design-agent"
      constellation.agent_name: "UI Design Agent"
      constellation.agent_role: "integration"
    ports:
      - "8040:8040"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

