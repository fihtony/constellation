services:
  registry:
    image: mvp-registry-agent:latest
    build:
      context: .
      dockerfile: registry/Dockerfile
    command: ["python3", "registry/app.py"]
    environment:
      REGISTRY_HOST: "0.0.0.0"
      REGISTRY_PORT: "9000"
    labels:
      mvp.agent_id: "capability-registry"
      mvp.agent_name: "Capability Registry"
      mvp.agent_role: "fundamental"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  init-register:
    image: mvp-init-register:latest
    build:
      context: .
      dockerfile: scripts/init-register.Dockerfile
    command: ["python3", "scripts/init_register.py"]
    depends_on:
      registry:
        condition: service_healthy
    environment:
      REGISTRY_URL: "http://registry:9000"
    labels:
      mvp.agent_id: "registry-bootstrap"
      mvp.agent_name: "Registry Bootstrap"
      mvp.agent_role: "fundamental"

  orchestrator:
    image: mvp-orchestrator-agent:latest
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: ["python3", "orchestrator/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
      tracker:
        condition: service_healthy
      scm:
        condition: service_healthy
    env_file:
      - ./orchestrator/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ADVERTISED_BASE_URL: "http://orchestrator:8080"
      REGISTRY_URL: "http://registry:9000"
      A2A_ACK_TIMEOUT_SECONDS: "15"
      A2A_TASK_TIMEOUT_SECONDS: "3600"
      ARTIFACT_ROOT: "/app/artifacts"
      DEFAULT_DYNAMIC_IMAGE: "mvp-android-agent:latest"
      DYNAMIC_AGENT_NETWORK: "mvp-network"
      # Agent URLs passed through to dynamically launched Android agent containers
      TRACKER_AGENT_URL: "http://tracker:8010"
      SCM_AGENT_URL: "http://scm:8020"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      ANDROID_DEFAULT_BRANCH: ""
      ARTIFACT_ROOT_HOST: "${ARTIFACT_ROOT_HOST:-}"
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      mvp.agent_id: "orchestrator-agent"
      mvp.agent_name: "Orchestrator Agent"
      mvp.agent_role: "fundamental"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  tracker:
    command: ["python3", "tracker/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./tracker/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8010"
      AGENT_ID: "tracker-agent"
      ADVERTISED_BASE_URL: "http://tracker:8010"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
    build:
      context: .
      dockerfile: tracker/Dockerfile
    image: mvp-tracker-agent:latest
    labels:
      mvp.agent_id: "tracker-agent"
      mvp.agent_name: "Tracker Agent"
      mvp.agent_role: "fundamental"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  scm:
    image: mvp-scm-agent:latest
    build:
      context: .
      dockerfile: scm/Dockerfile
    command: ["python3", "scm/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./scm/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8020"
      AGENT_ID: "scm-agent"
      ADVERTISED_BASE_URL: "http://scm:8020"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
    volumes:
      - ./artifacts:/app/artifacts
    labels:
      mvp.agent_id: "scm-agent"
      mvp.agent_name: "SCM Agent"
      mvp.agent_role: "fundamental"
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

networks:
  default:
    name: mvp-network
