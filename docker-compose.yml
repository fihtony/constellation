services:
  registry:
    image: constellation-registry-agent:latest
    build:
      context: .
      dockerfile: registry/Dockerfile
    command: ["python3", "registry/app.py"]
    environment:
      REGISTRY_HOST: "0.0.0.0"
      REGISTRY_PORT: "9000"
    labels:
      constellation.agent_id: "capability-registry"
      constellation.agent_name: "Capability Registry"
      constellation.agent_role: "fundamental"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  init-register:
    image: constellation-init-register:latest
    build:
      context: .
      dockerfile: scripts/init-register.Dockerfile
    command: ["python3", "scripts/init_register.py"]
    depends_on:
      registry:
        condition: service_healthy
    environment:
      REGISTRY_URL: "http://registry:9000"
    labels:
      constellation.agent_id: "registry-bootstrap"
      constellation.agent_name: "Registry Bootstrap"
      constellation.agent_role: "fundamental"

  compass:
    image: constellation-compass-agent:latest
    build:
      context: .
      dockerfile: compass/Dockerfile
    command: ["python3", "compass/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
      tracker:
        condition: service_healthy
      scm:
        condition: service_healthy
      team-lead:
        condition: service_healthy
    env_file:
      - ./compass/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ADVERTISED_BASE_URL: "http://compass:8080"
      REGISTRY_URL: "http://registry:9000"
      A2A_ACK_TIMEOUT_SECONDS: "15"
      A2A_TASK_TIMEOUT_SECONDS: "3600"
      ARTIFACT_ROOT: "/app/artifacts"
      DEFAULT_DYNAMIC_IMAGE: "constellation-android-agent:latest"
      DYNAMIC_AGENT_NETWORK: "constellation-network"
      # Agent URLs passed through to dynamically launched Android agent containers
      TRACKER_AGENT_URL: "http://tracker:8010"
      SCM_AGENT_URL: "http://scm:8020"
      COMPASS_URL: "http://compass:8080"
      ANDROID_DEFAULT_BRANCH: ""
      ARTIFACT_ROOT_HOST: "${ARTIFACT_ROOT_HOST:-}"
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      constellation.agent_id: "compass-agent"
      constellation.agent_name: "Compass Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  tracker:
    command: ["python3", "tracker/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./tracker/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8010"
      AGENT_ID: "tracker-agent"
      ADVERTISED_BASE_URL: "http://tracker:8010"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
    build:
      context: .
      dockerfile: tracker/Dockerfile
    image: constellation-tracker-agent:latest
    labels:
      constellation.agent_id: "tracker-agent"
      constellation.agent_name: "Tracker Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  scm:
    image: constellation-scm-agent:latest
    build:
      context: .
      dockerfile: scm/Dockerfile
    command: ["python3", "scm/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./scm/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8020"
      AGENT_ID: "scm-agent"
      ADVERTISED_BASE_URL: "http://scm:8020"
      REGISTRY_URL: "http://registry:9000"
      HEARTBEAT_INTERVAL: "30"
    volumes:
      - ./artifacts:/app/artifacts
    labels:
      constellation.agent_id: "scm-agent"
      constellation.agent_name: "SCM Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  team-lead:
    image: constellation-team-lead-agent:latest
    build:
      context: .
      dockerfile: team-lead/Dockerfile
    command: ["python3", "team-lead/app.py"]
    depends_on:
      registry:
        condition: service_healthy
      init-register:
        condition: service_completed_successfully
    env_file:
      - ./team-lead/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8030"
      AGENT_ID: "team-lead-agent"
      ADVERTISED_BASE_URL: "http://team-lead:8030"
      REGISTRY_URL: "http://registry:9000"
      JIRA_AGENT_URL: "http://tracker:8010"
      UI_DESIGN_AGENT_URL: "http://ui-design:8040"
      COMPASS_URL: "http://compass:8080"
      HEARTBEAT_INTERVAL: "30"
      MAX_REVIEW_CYCLES: "2"
      INPUT_WAIT_TIMEOUT_SECONDS: "7200"
      A2A_ACK_TIMEOUT_SECONDS: "15"
      A2A_TASK_TIMEOUT_SECONDS: "3600"
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      constellation.agent_id: "team-lead-agent"
      constellation.agent_name: "Team Lead Agent"
      constellation.agent_role: "fundamental"
    ports:
      - "8030:8030"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

